name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 3. Build web assets ─────────────────────────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_LK_P1: ${{ secrets.VITE_LK_P1 }}
          VITE_LK_P2: ${{ secrets.VITE_LK_P2 }}
          VITE_LK_P3: ${{ secrets.VITE_LK_P3 }}
          VITE_LK_LEN: ${{ secrets.VITE_LK_LEN }}
          VITE_LK_VH: ${{ secrets.VITE_LK_VH }}

      # ── 4. Java + Android SDK ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Capacitor: add + sync ─────────────────────────────────────────────
      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync Capacitor to Android
        run: npx cap sync android

      # ── 6. Apply Android patches (icons, theme, app_name) ───────────────────
      - name: Apply Android patches
        run: npm run android:patch

      # ── 7. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 8. Build debug APK ───────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 9. Collect APK ───────────────────────────────────────────────────────
      - name: Collect APK
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk apk-output/dud-dairy-debug.apk
          echo "APK_SIZE=$(du -sh apk-output/dud-dairy-debug.apk | cut -f1)" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # ── 10. Upload as artifact (30 days download) ────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dud-dairy-apk-${{ env.SHORT_SHA }}
          path: apk-output/dud-dairy-debug.apk
          retention-days: 30

      # ── 11. Create / update GitHub Release with APK attached ─────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.SHORT_SHA }}
          name: "Dud Dairy — ${{ env.BUILD_DATE }} (debug)"
          body: |
            ## 📱 Dud Dairy — Android Debug APK

            **Build:** `${{ env.SHORT_SHA }}`
            **Date:** ${{ env.BUILD_DATE }}
            **Size:** ${{ env.APK_SIZE }}

            ### Install Instructions
            1. Download `dud-dairy-debug.apk` below
            2. On your Android phone: Settings → Security → **Allow unknown sources**
            3. Open the downloaded APK and install

            > This is a debug build for testing. For Play Store, a signed release build is needed.
          files: apk-output/dud-dairy-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
