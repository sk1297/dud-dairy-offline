<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0f172a"/>

  <!-- Milk bottle body -->
  <rect x="196" y="200" width="120" height="200" rx="28" fill="#10b981"/>

  <!-- Bottle neck -->
  <rect x="218" y="150" width="76" height="60" rx="14" fill="#10b981"/>

  <!-- Bottle cap -->
  <rect x="210" y="132" width="92" height="30" rx="12" fill="#059669"/>

  <!-- Milk wave inside bottle -->
  <clipPath id="bottle">
    <rect x="196" y="200" width="120" height="200" rx="28"/>
  </clipPath>
  <g clip-path="url(#bottle)">
    <rect x="196" y="300" width="120" height="100" fill="#f0fdf4" opacity="0.95"/>
    <ellipse cx="256" cy="300" rx="62" ry="14" fill="#f0fdf4" opacity="0.9"/>
  </g>

  <!-- Shine on bottle -->
  <rect x="210" y="215" width="18" height="60" rx="9" fill="white" opacity="0.18"/>

  <!-- Drop accent -->
  <ellipse cx="340" cy="230" rx="18" ry="24" fill="#34d399" opacity="0.7"/>
  <polygon points="340,210 330,240 350,240" fill="#34d399" opacity="0.7"/>
</svg>
